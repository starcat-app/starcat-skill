name: Bug report
description: Report a reproducible problem in starcat-skill
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Security vulnerabilities belong in GitHub Security Advisories. Remove tokens, keys, private data, and credentials from this report.
  - type: input
    id: version
    attributes:
      label: Affected version or commit
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Operating system, architecture, browser, runtime, or deployment
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove all secrets and private data before attaching evidence.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and removed sensitive information.
          required: true
